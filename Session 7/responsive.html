<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Grid</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f1f3f6;
            padding: 30px;
        }

        .product-section {
            max-width: 1100px;
            margin: auto;
        }

        .title {
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Desktop */
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            object-fit: cover;
        }

        .product-card h3 {
            margin-top: 12px;
        }

        /* Tablet */
        @media (max-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <section class="product-section">
        <h1 class="title">Top Products</h1>

        <div class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Smartphone</h3>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Laptop</h3>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Headphones</h3>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Smart Watch</h3>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Camera</h3>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Bluetooth Speaker</h3>
            </div>
        </div>
    </section>

</body>
</html>
