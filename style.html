<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Meta Viewport for Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flipkart Product Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-card">
        <img src="https://via.placeholder.com/250x200" alt="Product Image">

        <div class="product-info">
            <h3>Wireless Headphones</h3>
            <p class="desc">Noise Cancellation, Bluetooth 5.3</p>

            <div class="price-section">
                <span class="price">₹1,999</span>
                <span class="old-price">₹3,999</span>
                <span class="discount">50% off</span>
            </div>

            <button>Add to Cart</button>
        </div>
    </div>

</body>
</html>
